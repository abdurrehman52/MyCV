<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Abdur Rehman Portfolio</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
  }

  .container {
    padding: 60px 20px;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 10px;
  }

  p {
    color: #cbd5e1;
    font-size: 18px;
  }

  .contact a {
    display: block;
    margin: 6px;
    color: #60a5fa;
    text-decoration: none;
  }

  .buttons {
    margin-top: 25px;
  }

  .btn {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }

  .view {
    background: #3b82f6;
    color: white;
  }

  .download {
    background: #22c55e;
    color: white;
  }

  .projects {
    background: #f59e0b;
    color: black;
  }

  .btn:hover {
    transform: scale(1.05);
  }

  .cv-box {
    margin-top: 50px;
    display: none;
  }

  iframe {
    width: 80%;
    height: 600px;
    border: none;
    border-radius: 10px;
  }

  footer {
    margin-top: 50px;
    color: #94a3b8;
  }
</style>
</head>

<body>

<div class="container">

  <h1>Abdur Rehman</h1>
  <p>Web Developer | Designer | Freelancer | Data Engineer | Data Analyst</p>

  <!-- CONTACT -->
  <div class="contact">
    <a href="mailto:abdurrehman0702@gmail.com" class="btn view">
    📧 Email Me: abdurrehman0702@gmail.com
    </a>
    <a href="tel:03477204950" class="btn view">📞 +923477204950</a>
</div>

  <!-- BUTTONS -->
  <div class="buttons">

    <a href="#cv" class="btn view">View CV</a>

    <a href="AR CV.pdf" download class="btn download">
      Download CV
    </a>

    <a href="https://drive.google.com/drive/folders/1vaffbgYsrIAwGbzpNU73yEHmceIRyuRN"
       target="_blank"
       class="btn projects">
      My Projects
    </a>

  </div>

  <!-- CV VIEW -->
  <div id="cv" class="cv-box">
    <h2>My CV Preview</h2>
    <iframe src="AR CV.pdf"></iframe>
  </div>

  <footer>
    © 2026 Abdur Rehman. All rights reserved.
  </footer>

</div>

<script>
  document.querySelector(".view").addEventListener("click", function () {
    document.getElementById("cv").style.display = "block";
  });
</script>

</body>
</html>
