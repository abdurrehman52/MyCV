<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My CV</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
  }

  .container {
    padding: 60px 20px;
  }

  h1 {
    font-size: 40px;
    margin-bottom: 10px;
  }

  p {
    color: #cbd5e1;
    font-size: 18px;
  }

  .buttons {
    margin-top: 25px;
  }

  .btn {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }

  .view {
    background: #3b82f6;
    color: white;
  }

  .download {
    background: #22c55e;
    color: white;
  }

  .btn:hover {
    transform: scale(1.05);
  }

  .cv-box {
    margin-top: 50px;
    display: none;
  }

  iframe {
    width: 80%;
    height: 600px;
    border: none;
    border-radius: 10px;
  }

  footer {
    margin-top: 50px;
    color: #94a3b8;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Your Name</h1>
  <p>Web Developer | Designer | Freelancer</p>

  <div class="buttons">
    <!-- VIEW CV -->
    <a href="#cv" class="btn view">View CV</a>

    <!-- DOWNLOAD CV -->
    <a href="AR CV.pdf" download class="btn download">Download CV</a>
  </div>

  <!-- CV VIEW SECTION -->
  <div id="cv" class="cv-box">
    <h2>My CV Preview</h2>
    <iframe src="AR CV.pdf"></iframe>
  </div>

  <footer>
    © 2026 Your Name. All rights reserved.
  </footer>
</div>

<script>
  document.querySelector(".view").addEventListener("click", function () {
    document.getElementById("cv").style.display = "block";
  });
</script>

</body>
</html>
