<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdur Rehman | Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            min-height: 100vh;
        }

        .container {
            padding: 60px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 8px;
        }

        p {
            color: #cbd5e1;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .contact {
            margin-bottom: 30px;
        }

        .contact a {
            display: block;
            width: 80%;
            max-width: 400px;
            margin: 12px auto;
            padding: 14px 20px;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .contact a:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            color: white;
            min-width: 160px;
        }

        .view {
            background: #3b82f6;
        }

        .download {
            background: #22c55e;
        }

        .projects {
            background: #f59e0b;
            color: black;
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .cv-box {
            margin-top: 60px;
            display: none;
        }

        iframe {
            width: 90%;
            max-width: 800px;
            height: 650px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        footer {
            margin-top: 80px;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            iframe { height: 500px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Abdur Rehman</h1>
        <p>Web Developer | Designer | Freelancer | Data Engineer | Data Analyst</p>

        <!-- CONTACT -->
        <div class="contact">
            <a href="mailto:abdurrehman0702@gmail.com">
                📧 Email Me: abdurrehman0702@gmail.com
            </a>
            <a href="tel:+923477204950">
                📞 +92 347 7204950
            </a>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="buttons">
            <a href="#cv" class="btn view" id="view-cv-btn">
                View CV
            </a>
            <a href="AR CV.pdf" download class="btn download">
                Download CV
            </a>
            <a href="https://drive.google.com/drive/folders/1vaffbgYsrIAwGbzpNU73yEHmceIRyuRN" 
               target="_blank" 
               class="btn projects">
                My Projects
            </a>
        </div>

        <!-- CV PREVIEW SECTION -->
        <div id="cv" class="cv-box">
            <h2>My CV Preview</h2>
            <iframe src="AR CV.pdf"></iframe>
        </div>

        <footer>
            © 2026 Abdur Rehman. All rights reserved.
        </footer>
    </div>

    <script>
        // Toggle CV preview
        document.getElementById("view-cv-btn").addEventListener("click", function (e) {
            e.preventDefault(); // Prevent jumping to #cv
            const cvBox = document.getElementById("cv");
            
            if (cvBox.style.display === "block") {
                cvBox.style.display = "none";
            } else {
                cvBox.style.display = "block";
                cvBox.scrollIntoView({ behavior: "smooth" });
            }
        });
    </script>
</body>
</html>
